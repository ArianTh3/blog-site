 {% load static %}
 {% load humanize %}
 <!-- Recent Posts Widget -->
 <div class="recent-posts-widget widget-item">
    <h3 class="widget-title">Recent Posts</h3>
    {% for post in posts %}     
    
    <div class="post-item">
        
      <img src="{{post.image_url}}" alt="" class="flex-shrink-0">
      <div>
        <h4><a href="{% url 'blog:postdetail' pk=post.id %}">{{post.title}}</a></h4>
        <time datetime="2020-01-01">{{post.published_date|naturaltime}}</time>
        
      </div>
      
    </div><!-- End recent post item-->
    {% endfor %}

  </div><!--/Recent Posts Widget -->
