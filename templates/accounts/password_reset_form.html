{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
	<title>Forgot Password</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="{% static 'login/vendor/bootstrap/css/bootstrap.min.css' %}">
	<link rel="stylesheet" type="text/css" href="{% static 'login/fonts/font-awesome-4.7.0/css/font-awesome.min.css' %}">
	<link rel="stylesheet" type="text/css" href="{% static 'login/css/util.css' %}">
	<link rel="stylesheet" type="text/css" href="{% static 'login/css/main.css' %}">
</head>
<body>
	<div class="limiter">
		<div class="container-login100">
			<div class="wrap-login100">
				<form class="login100-form validate-form" method="post">
					<span class="login100-form-title">Forgot Password</span>
					{% csrf_token %}
					<p class="text-center" style="margin-bottom:20px; font-size:14px;">
						Enter your email and we'll send a reset link.
					</p>

					{% if form.non_field_errors %}
						<div class="text-center" style="color:#f00;">{{ form.non_field_errors.0 }}</div>
					{% endif %}

					<div class="wrap-input100 validate-input">
						{{ form.email }}
						<span class="focus-input100"></span>
						<span class="symbol-input100">
							<i class="fa fa-envelope" aria-hidden="true"></i>
						</span>
					</div>
					{% if form.email.errors %}
						<span style="color:#f00; font-size:13px;">{{ form.email.errors.0 }}</span>
					{% endif %}

					<div class="container-login100-form-btn">
						<button class="login100-form-btn" type="submit">Send Reset Link</button>
					</div>

					<div class="text-center p-t-12">
						<a class="txt2" href="{% url 'accounts:login' %}">Back to Login</a>
					</div>
				</form>
			</div>
		</div>
	</div>
</body>
</html>
