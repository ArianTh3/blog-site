{% load static %}
{% load humanize %}
 <!-- Latest Posts Section -->
 <section id="latest-posts" class="latest-posts section">

    <!-- Section Title -->
    <div class="container section-title" data-aos="fade-up">
      <h2>Latest Posts</h2>
      <div><span>Check Our</span> <span class="description-title">Latest Posts</span></div>
    </div><!-- End Section Title -->

    <div class="container" data-aos="fade-up" data-aos-delay="100">
      <div class="row gy-4">
        {% for post in posts %}
        <div class="col-lg-4">
          
          <article>

            <div class="post-img">
              <img src="{{post.image_url}}" alt="" class="img-fluid">
            </div>
            {% for cat in post.category.all %}
            <p class="post-category">{{cat.name}}</p>
            {% if not forloop.last %},{% endif %} {% endfor %}
            <h2 class="title">
              <a href="{% url "blog:postdetail" pk=post.id %}">{{post.title}}</a>
            </h2>

            <div class="d-flex align-items-center">
              <img src="{% static 'assets/img/person/person-f-12.webp'  %}" alt="" class="img-fluid post-author-img flex-shrink-0">
              <div class="post-meta">
                <p class="post-author">{{post.author.username}}</p>
                <p class="post-date">
                  <time datetime="2022-01-01">{{post.published_date|naturaltime}}</time>
                </p>
              </div>
            </div>

          </article>
        </div><!-- End post list item -->

        {% endfor %}
      </div>
    </div>

  </section><!-- /Latest Posts Section -->
